{% extends 'inventory/base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-lg border-0" style="border-radius: 16px;">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-person-circle display-4 text-primary"></i>
                    <h2 class="mt-3 mb-1">Вход</h2>
                    <p class="text-muted">Введите логин и пароль Django</p>
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    {% if form.errors %}
                    <div class="alert alert-danger">
                        Неверный логин или пароль
                    </div>
                    {% endif %}
                    
                    <div class="mb-3">
                        <label for="id_username" class="form-label fw-semibold">
                            <i class="bi bi-person"></i> Логин
                        </label>
                        <input type="text" name="username" id="id_username" class="form-control" required autofocus>
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_password" class="form-label fw-semibold">
                            <i class="bi bi-lock"></i> Пароль
                        </label>
                        <input type="password" name="password" id="id_password" class="form-control" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                        <i class="bi bi-box-arrow-in-right"></i> Войти
                    </button>
                    
                    <input type="hidden" name="next" value="{{ next }}">
                </form>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <a href="/" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-house"></i> На главную
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
